# Nginx como reverse proxy para hive-api.
# Responsabilidades:
#   1. Terminar TLS (HTTPS) — el certificado vive en Nginx, no en Go
#   2. Rate limiting — protege contra DDoS y abusos
#   3. Gzip — comprime respuestas JSON grandes
#   4. Forward headers — pasa IP real del cliente al backend

# Rate limiting: definimos zonas antes del bloque http o server
# $binary_remote_addr: clave del rate limit = IP del cliente (binario, más eficiente que string)
# zone=api:10m: nombre de la zona + 10MB de memoria para guardar el estado
# rate=60r/m: 60 requests por minuto por IP
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

# Zona más restrictiva para endpoints sensibles (auth)
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Redirigimos HTTP → HTTPS en producción.
    # Comentar este bloque en desarrollo si no tienes certificado.
    # return 301 https://$host$request_uri;

    # Compresión gzip para responses JSON (típicamente 70-80% reducción)
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # Headers de seguridad
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # --------------------------------------------------------
    # Endpoint de auth — rate limit estricto (10 req/min)
    # Protege contra ataques de fuerza bruta en /auth/login
    # --------------------------------------------------------
    location /auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # Resto de endpoints — rate limit general (60 req/min)
    # --------------------------------------------------------
    location / {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts alineados con los del servidor Go (15s)
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
    }
}
